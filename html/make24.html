<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24点 · Make 24</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:wght@300;400;600;700&family=Noto+Serif+SC:wght@300;400;700&display=swap');

  :root {
    --felt: #0d3b2a;
    --felt-light: #145a40;
    --felt-dark: #07261a;
    --gold: #c9a84c;
    --gold-bright: #e8cc6a;
    --gold-dim: #8a7234;
    --cream: #f5f0e1;
    --card-bg: #fffef8;
    --card-shadow: rgba(0,0,0,0.45);
    --red-suit: #c0392b;
    --black-suit: #1a1a2e;
    --text-primary: #e8dcc0;
    --text-secondary: #8a9a80;
    --accent-green: #4a8a5a;
    --accent-red: #c84040;
    --input-bg: rgba(0,0,0,0.3);
    --border-gold: rgba(201,168,76,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Crimson Pro', 'Noto Serif SC', serif;
    background: var(--felt-dark);
    min-height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    position: relative;
  }

  /* Felt texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 40%, var(--felt-light) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 20% 80%, rgba(20,90,64,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 20%, rgba(20,90,64,0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Felt noise */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(201,168,76,0.6), rgba(138,114,52,0.4));
    border-radius: 4px;
    border: 1px solid rgba(201,168,76,0.3);
  }
  ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, rgba(232,204,106,0.8), rgba(201,168,76,0.6)); }
  * { scrollbar-width: thin; scrollbar-color: rgba(201,168,76,0.5) rgba(0,0,0,0.3); }

  /* Layout */
  .page { position: relative; z-index: 2; width: 100%; max-width: 720px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease-out;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 6px;
    text-shadow: 0 2px 12px rgba(201,168,76,0.3);
    line-height: 1;
  }
  .header .sub {
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--gold-dim);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  /* Cards Area */
  .cards-stage {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 24px 0 8px;
    perspective: 800px;
    animation: fadeUp 0.7s ease-out 0.1s backwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    width: 110px;
    height: 156px;
    background: var(--card-bg);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    box-shadow:
      0 6px 20px var(--card-shadow),
      0 2px 6px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    border: 1px solid rgba(0,0,0,0.08);
  }

  .card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow:
      0 16px 40px rgba(0,0,0,0.5),
      0 6px 16px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }

  .card.deal {
    animation: dealCard 0.5s cubic-bezier(0.34,1.56,0.64,1) backwards;
  }
  .card:nth-child(1).deal { animation-delay: 0s; }
  .card:nth-child(2).deal { animation-delay: 0.1s; }
  .card:nth-child(3).deal { animation-delay: 0.2s; }
  .card:nth-child(4).deal { animation-delay: 0.3s; }

  @keyframes dealCard {
    from { opacity: 0; transform: translateY(-60px) rotateY(90deg) scale(0.6); }
    to { opacity: 1; transform: translateY(0) rotateY(0) scale(1); }
  }

  .card.selected {
    transform: translateY(-12px) scale(1.06);
    box-shadow:
      0 16px 40px rgba(201,168,76,0.4),
      0 6px 16px rgba(0,0,0,0.3),
      0 0 0 3px var(--gold);
  }

  .card-corner {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
  }
  .card-corner.top { top: 8px; left: 10px; text-align: left; }
  .card-corner.bottom { bottom: 8px; right: 10px; text-align: right; transform: rotate(180deg); }
  .card-corner .suit { font-size: 12px; display: block; margin-top: 1px; }

  .card-center {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1;
  }

  .card .red { color: var(--red-suit); }
  .card .black { color: var(--black-suit); }

  /* Timer */
  .timer-bar {
    width: 100%;
    max-width: 480px;
    margin: 16px auto 0;
    height: 6px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-bright));
    border-radius: 3px;
    transition: width 1s linear, background 0.5s;
    width: 100%;
  }
  .timer-fill.danger {
    background: linear-gradient(90deg, var(--accent-red), #e05555);
  }

  .timer-text {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .timer-text.danger { color: var(--accent-red); font-weight: 600; }

  /* Input Area */
  .input-area {
    margin: 20px auto 0;
    max-width: 480px;
    animation: fadeUp 0.7s ease-out 0.3s backwards;
  }

  .expr-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .expr-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border-gold);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 2px;
  }
  .expr-input::placeholder { color: rgba(232,220,192,0.3); font-size: 16px; letter-spacing: 1px; }
  .expr-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.15);
  }

  .submit-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border: none;
    border-radius: 10px;
    color: var(--felt-dark);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 12px rgba(201,168,76,0.3);
    white-space: nowrap;
  }
  .submit-btn:hover {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    box-shadow: 0 6px 20px rgba(201,168,76,0.4);
    transform: translateY(-1px);
  }
  .submit-btn:active { transform: translateY(1px); }
  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Operator buttons */
  .op-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .op-btn {
    width: 48px;
    height: 42px;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--border-gold);
    border-radius: 8px;
    color: var(--gold);
    font-size: 20px;
    font-family: 'Playfair Display', serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .op-btn:hover {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    transform: scale(1.08);
  }
  .op-btn:active { transform: scale(0.95); }

  .op-btn.wide {
    width: auto;
    padding: 0 16px;
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* Message / Feedback */
  .msg-area {
    text-align: center;
    min-height: 40px;
    margin-top: 14px;
    font-size: 15px;
    color: var(--text-secondary);
    transition: all 0.3s;
  }
  .msg-area.success { color: #6abf6a; font-weight: 600; }
  .msg-area.error { color: var(--accent-red); }
  .msg-area.hint { color: var(--gold); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 18px;
    animation: fadeUp 0.7s ease-out 0.4s backwards;
  }

  .ctrl-btn {
    padding: 10px 20px;
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border-gold);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .ctrl-btn:hover {
    background: rgba(201,168,76,0.18);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.1);
  }
  .ctrl-btn.primary {
    background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.12));
    border-color: var(--gold);
  }
  .ctrl-btn.danger {
    border-color: rgba(200,64,64,0.4);
    color: var(--accent-red);
    background: rgba(200,64,64,0.06);
  }
  .ctrl-btn.danger:hover {
    border-color: var(--accent-red);
    background: rgba(200,64,64,0.12);
  }

  /* Score Panel */
  .score-panel {
    margin-top: 28px;
    background: linear-gradient(145deg, rgba(13,59,42,0.8), rgba(7,38,26,0.9));
    border: 1px solid var(--border-gold);
    border-radius: 16px;
    padding: 20px 24px;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,168,76,0.1);
    animation: fadeUp 0.7s ease-out 0.5s backwards;
  }

  .score-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-gold);
    text-align: center;
  }

  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
  }

  .score-item {
    text-align: center;
    padding: 12px 6px;
    border-radius: 10px;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(201,168,76,0.1);
  }

  .score-label {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .score-value {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
    transition: transform 0.3s;
  }

  .score-item.win .score-value { color: #6abf6a; }
  .score-item.lose .score-value { color: var(--accent-red); }
  .score-item.total .score-value { color: var(--gold); }
  .score-item.streak .score-value { color: var(--gold-bright); font-size: 24px; }

  .score-value.pop { animation: scorePop 0.4s ease-out; }
  @keyframes scorePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .streak-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    justify-content: center;
  }
  .streak-row span { flex-shrink: 0; }
  .streak-dots { display: flex; gap: 4px; }
  .sdot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.2);
    transition: all 0.3s;
  }
  .sdot.win { background: #6abf6a; border-color: #6abf6a; box-shadow: 0 0 5px rgba(106,191,106,0.5); }
  .sdot.lose { background: var(--accent-red); border-color: var(--accent-red); box-shadow: 0 0 5px rgba(200,64,64,0.5); }
  .sdot.skip { background: var(--gold-dim); border-color: var(--gold-dim); }

  .reset-score {
    display: block;
    margin: 10px auto 0;
    padding: 5px 14px;
    background: transparent;
    border: 1px solid rgba(200,64,64,0.25);
    color: rgba(200,64,64,0.5);
    border-radius: 6px;
    font-size: 11px;
    font-family: 'Crimson Pro', serif;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .reset-score:hover { border-color: var(--accent-red); color: var(--accent-red); }

  /* Difficulty & Timer config */
  .config-panel {
    margin-top: 18px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.7s ease-out 0.6s backwards;
  }

  .cfg-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border-gold);
    border-radius: 10px;
    padding: 6px 8px;
  }

  .cfg-label {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    padding: 0 6px;
  }

  .cfg-btn {
    padding: 6px 10px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-secondary);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Crimson Pro', serif;
  }
  .cfg-btn:hover { color: var(--gold); }
  .cfg-btn.active {
    background: rgba(201,168,76,0.18);
    border-color: var(--gold);
    color: var(--gold-bright);
  }

  /* Win overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,38,26,0.88);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .overlay-box {
    text-align: center;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s backwards;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .overlay-icon { font-size: 56px; margin-bottom: 8px; }
  .overlay-title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    color: var(--gold-bright);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }
  .overlay-sub {
    font-size: 15px;
    color: var(--text-secondary);
    margin: 8px 0 24px;
    font-style: italic;
  }
  .overlay-expr {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 20px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    display: inline-block;
    border: 1px solid var(--border-gold);
  }

  /* History */
  .history {
    margin-top: 20px;
    animation: fadeUp 0.7s ease-out 0.7s backwards;
  }
  .history-title {
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 10px;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid rgba(201,168,76,0.08);
  }
  .history-item .h-num {
    font-family: 'Playfair Display', serif;
    color: var(--gold-dim);
    font-size: 12px;
    min-width: 24px;
  }
  .history-item .h-nums {
    color: var(--text-secondary);
    flex: 1;
  }
  .history-item .h-expr {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 14px;
  }
  .history-item .h-result {
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .history-item .h-result.win { color: #6abf6a; }
  .history-item .h-result.lose { color: var(--accent-red); }
  .history-item .h-result.skip { color: var(--gold-dim); }

  /* Responsive */
  @media (max-width: 520px) {
    .cards-stage { gap: 10px; }
    .card { width: 80px; height: 116px; }
    .card-center { font-size: 32px; }
    .card-corner { font-size: 11px; }
    .card-corner .suit { font-size: 9px; }
    .header h1 { font-size: 30px; }
    .score-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="header">
    <h1>MAKE 24</h1>
    <div class="sub">算 术 挑 战</div>
  </div>

  <!-- Cards -->
  <div class="cards-stage" id="cardsStage"></div>

  <!-- Timer -->
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="timer-text" id="timerText">60 秒</div>

  <!-- Input -->
  <div class="input-area">
    <div class="expr-row">
      <input type="text" class="expr-input" id="exprInput" placeholder="输入表达式，如 (3+5)*8/2" autocomplete="off">
      <button class="submit-btn" id="submitBtn">确认</button>
    </div>
    <div class="op-row">
      <button class="op-btn" data-op="+">+</button>
      <button class="op-btn" data-op="-">−</button>
      <button class="op-btn" data-op="×">×</button>
      <button class="op-btn" data-op="÷">÷</button>
      <button class="op-btn" data-op="(">(</button>
      <button class="op-btn" data-op=")">)</button>
      <button class="op-btn wide" data-op="back">⌫</button>
      <button class="op-btn wide" data-op="clear">清空</button>
    </div>
    <div class="msg-area" id="msgArea">&nbsp;</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn primary" id="newRoundBtn">换一题</button>
    <button class="ctrl-btn" id="hintBtn">提示</button>
    <button class="ctrl-btn danger" id="skipBtn">跳过</button>
  </div>

  <!-- Config -->
  <div class="config-panel">
    <div class="cfg-group">
      <span class="cfg-label">难度</span>
      <button class="cfg-btn active" data-diff="easy">简单</button>
      <button class="cfg-btn" data-diff="normal">普通</button>
      <button class="cfg-btn" data-diff="hard">困难</button>
    </div>
    <div class="cfg-group">
      <span class="cfg-label">限时</span>
      <button class="cfg-btn" data-time="30">30s</button>
      <button class="cfg-btn active" data-time="60">60s</button>
      <button class="cfg-btn" data-time="120">120s</button>
      <button class="cfg-btn" data-time="0">∞</button>
    </div>
  </div>

  <!-- Score -->
  <div class="score-panel">
    <div class="score-title">对 局 记 录</div>
    <div class="score-grid">
      <div class="score-item win">
        <div class="score-label">胜</div>
        <div class="score-value" id="sWin">0</div>
      </div>
      <div class="score-item lose">
        <div class="score-label">负</div>
        <div class="score-value" id="sLose">0</div>
      </div>
      <div class="score-item total">
        <div class="score-label">总局</div>
        <div class="score-value" id="sTotal">0</div>
      </div>
      <div class="score-item streak">
        <div class="score-label">连胜</div>
        <div class="score-value" id="sStreak">0</div>
      </div>
    </div>
    <div class="streak-row">
      <span>近况</span>
      <div class="streak-dots" id="streakDots"></div>
    </div>
    <button class="reset-score" id="resetScoreBtn">清空记录</button>
  </div>

  <!-- History -->
  <div class="history" id="historySection" style="display:none;">
    <div class="history-title">历史记录</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon" id="ovIcon">🎉</div>
    <div class="overlay-title" id="ovTitle">正确!</div>
    <div class="overlay-sub" id="ovSub">算术高手，名不虚传</div>
    <div class="overlay-expr" id="ovExpr"></div>
    <br>
    <button class="ctrl-btn primary" id="ovNextBtn" style="font-size:16px;padding:12px 32px;">下一题</button>
  </div>
</div>

<script>
// ===== 24 Point Game =====

const SUITS = ['♠','♥','♦','♣'];
const SUIT_COLORS = {'♠':'black','♥':'red','♦':'red','♣':'black'};
const FACE_NAMES = {1:'A',11:'J',12:'Q',13:'K'};

let currentNums = [];
let difficulty = 'easy';
let timeLimit = 60;
let timerInterval = null;
let timeLeft = 60;
let roundActive = false;
let hintUsed = false;
let currentSolution = null;

// Score
let score = { wins: 0, losses: 0, streak: 0, bestStreak: 0, recent: [] };
let history = [];
try {
  const s = localStorage.getItem('make24-score');
  if (s) score = JSON.parse(s);
  const h = localStorage.getItem('make24-history');
  if (h) history = JSON.parse(h);
} catch(e) {}

renderScore();
renderHistory();

// ===== 24 Solver =====
function solve24(nums) {
  const ops = ['+','-','*','/'];
  const results = [];

  function calc(a, op, b) {
    switch(op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b !== 0 ? a / b : NaN;
    }
  }

  function fmt(a, op, b, av, bv) {
    const opDisplay = op === '*' ? '×' : op === '/' ? '÷' : op;
    return `(${a} ${opDisplay} ${b})`;
  }

  function tryAll(arr, exprs) {
    if (arr.length === 1) {
      if (Math.abs(arr[0] - 24) < 1e-9) {
        results.push(exprs[0]);
        return true;
      }
      return false;
    }
    for (let i = 0; i < arr.length; i++) {
      for (let j = 0; j < arr.length; j++) {
        if (i === j) continue;
        const rest = [], restE = [];
        for (let k = 0; k < arr.length; k++) {
          if (k !== i && k !== j) { rest.push(arr[k]); restE.push(exprs[k]); }
        }
        for (const op of ops) {
          const val = calc(arr[i], op, arr[j]);
          if (isNaN(val) || !isFinite(val)) continue;
          const expr = fmt(exprs[i], op, exprs[j], arr[i], arr[j]);
          if (tryAll([val, ...rest], [expr, ...restE])) return true;
        }
      }
    }
    return false;
  }

  tryAll(nums, nums.map(String));
  return results.length > 0 ? results[0] : null;
}

// ===== Generate Puzzle =====
function generatePuzzle() {
  const ranges = { easy: [1,9], normal: [1,10], hard: [1,13] };
  const [lo, hi] = ranges[difficulty];

  let nums, solution;
  let attempts = 0;
  do {
    nums = Array.from({length:4}, () => lo + Math.floor(Math.random() * (hi - lo + 1)));
    solution = solve24(nums);
    attempts++;
    if (attempts > 500) { nums = [1,2,3,4]; solution = '1×2×3×4'; break; }
  } while (!solution);

  currentNums = nums;
  currentSolution = solution;
  hintUsed = false;
  return nums;
}

// ===== Render Cards =====
function renderCards(nums) {
  const stage = document.getElementById('cardsStage');
  stage.innerHTML = '';
  nums.forEach((n, i) => {
    const suit = SUITS[Math.floor(Math.random() * 4)];
    const color = SUIT_COLORS[suit];
    const face = FACE_NAMES[n] || n;

    const card = document.createElement('div');
    card.className = 'card deal';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-corner top ${color}"><span>${face}</span><span class="suit">${suit}</span></div>
      <div class="card-center ${color}">${n}</div>
      <div class="card-corner bottom ${color}"><span>${face}</span><span class="suit">${suit}</span></div>
    `;
    card.addEventListener('click', () => insertNum(n));
    stage.appendChild(card);
  });
}

function insertNum(n) {
  const input = document.getElementById('exprInput');
  const pos = input.selectionStart;
  const val = input.value;
  input.value = val.slice(0, pos) + n + val.slice(pos);
  input.focus();
  input.setSelectionRange(pos + String(n).length, pos + String(n).length);
}

// ===== Timer =====
function startTimer() {
  stopTimer();
  if (timeLimit === 0) {
    document.getElementById('timerFill').style.width = '100%';
    document.getElementById('timerFill').classList.remove('danger');
    document.getElementById('timerText').textContent = '∞ 无限时';
    document.getElementById('timerText').classList.remove('danger');
    return;
  }
  timeLeft = timeLimit;
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      stopTimer();
      timeUp();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const pct = (timeLeft / timeLimit) * 100;
  const fill = document.getElementById('timerFill');
  const text = document.getElementById('timerText');
  fill.style.width = pct + '%';
  text.textContent = timeLeft + ' 秒';

  if (timeLeft <= 10) {
    fill.classList.add('danger');
    text.classList.add('danger');
  } else {
    fill.classList.remove('danger');
    text.classList.remove('danger');
  }
}

function timeUp() {
  roundActive = false;
  showMsg('时间到！', 'error');
  addResult('lose');
  showOverlay('⏰', '时间到', '这道题超时了', currentSolution ? `答案：${cleanExpr(currentSolution)}` : '');
}

// ===== Validate Expression =====
function validateExpr(expr) {
  // Replace display operators
  let calcExpr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');

  // Check only valid chars
  if (!/^[\d\s\+\-\*\/\(\)\.]+$/.test(calcExpr)) {
    return { ok: false, msg: '表达式包含非法字符' };
  }

  // Extract numbers used
  const usedNums = calcExpr.match(/\d+/g);
  if (!usedNums || usedNums.length !== 4) {
    return { ok: false, msg: '必须恰好使用4个数字' };
  }

  const used = usedNums.map(Number).sort((a,b) => a-b);
  const expected = [...currentNums].sort((a,b) => a-b);

  if (used.join(',') !== expected.join(',')) {
    return { ok: false, msg: `必须使用给定的4个数字：${currentNums.join(', ')}` };
  }

  // Evaluate
  let result;
  try {
    result = Function('"use strict"; return (' + calcExpr + ')')();
  } catch(e) {
    return { ok: false, msg: '表达式语法错误' };
  }

  if (typeof result !== 'number' || !isFinite(result)) {
    return { ok: false, msg: '计算结果无效（可能除以了零）' };
  }

  if (Math.abs(result - 24) < 1e-9) {
    return { ok: true, result: 24 };
  } else {
    return { ok: false, msg: `结果为 ${Number.isInteger(result) ? result : result.toFixed(2)}，不等于 24` };
  }
}

function cleanExpr(expr) {
  return expr.replace(/\*/g, '×').replace(/\//g, '÷');
}

// ===== Submit =====
function submitAnswer() {
  if (!roundActive) return;
  const input = document.getElementById('exprInput');
  const expr = input.value.trim();
  if (!expr) return;

  const v = validateExpr(expr);
  if (v.ok) {
    stopTimer();
    roundActive = false;
    showMsg('✓ 正确！', 'success');
    addResult('win', expr);
    const phrases = ['算术高手，名不虚传','思路清晰，一击即中','巧思妙算，令人赞叹','运筹帷幄，精准无误'];
    showOverlay('🎉', '正 确', phrases[Math.floor(Math.random()*phrases.length)], cleanExpr(expr));
  } else {
    showMsg(v.msg, 'error');
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 400);
  }
}

// ===== Messages =====
function showMsg(text, type) {
  const el = document.getElementById('msgArea');
  el.textContent = text;
  el.className = 'msg-area ' + (type || '');
}

// ===== Overlay =====
function showOverlay(icon, title, sub, expr) {
  document.getElementById('ovIcon').textContent = icon;
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovSub').textContent = sub;
  document.getElementById('ovExpr').textContent = expr || '';
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// ===== Score =====
function addResult(type, expr) {
  if (type === 'win') {
    score.wins++;
    score.streak++;
    if (score.streak > score.bestStreak) score.bestStreak = score.streak;
    score.recent.push('win');
  } else if (type === 'lose') {
    score.losses++;
    score.streak = 0;
    score.recent.push('lose');
  } else {
    score.recent.push('skip');
  }
  if (score.recent.length > 12) score.recent.shift();

  history.unshift({ nums: [...currentNums], expr: expr || '', result: type });
  if (history.length > 50) history.pop();

  saveScore();
  renderScore();
  renderHistory();
}

function saveScore() {
  try {
    localStorage.setItem('make24-score', JSON.stringify(score));
    localStorage.setItem('make24-history', JSON.stringify(history));
  } catch(e) {}
}

function renderScore() {
  const w = document.getElementById('sWin');
  const l = document.getElementById('sLose');
  const t = document.getElementById('sTotal');
  const s = document.getElementById('sStreak');
  w.textContent = score.wins;
  l.textContent = score.losses;
  t.textContent = score.wins + score.losses;
  s.textContent = score.streak;

  [w,l,t,s].forEach(el => {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  });

  const dots = document.getElementById('streakDots');
  dots.innerHTML = '';
  score.recent.forEach(r => {
    const d = document.createElement('div');
    d.className = 'sdot ' + r;
    dots.appendChild(d);
  });
}

function renderHistory() {
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (history.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  list.innerHTML = '';
  history.slice(0, 20).forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <span class="h-num">#${history.length - i}</span>
      <span class="h-nums">[${h.nums.join(', ')}]</span>
      <span class="h-expr">${h.expr ? cleanExpr(h.expr) : '—'}</span>
      <span class="h-result ${h.result}">${h.result === 'win' ? '胜' : h.result === 'lose' ? '负' : '跳过'}</span>
    `;
    list.appendChild(item);
  });
}

// ===== New Round =====
function newRound() {
  hideOverlay();
  const nums = generatePuzzle();
  renderCards(nums);
  document.getElementById('exprInput').value = '';
  showMsg('使用这4个数字，通过 +−×÷ 运算得到 24', '');
  roundActive = true;
  startTimer();
  document.getElementById('exprInput').focus();
}

// ===== Hint =====
function showHint() {
  if (!roundActive || !currentSolution) return;
  hintUsed = true;
  // Show partial hint - first 2 numbers and first operator
  const clean = cleanExpr(currentSolution);
  // Show half the solution
  const halfLen = Math.ceil(clean.length * 0.5);
  const partial = clean.slice(0, halfLen) + '…';
  showMsg('提示：' + partial, 'hint');
}

// ===== Skip =====
function skipRound() {
  if (!roundActive) return;
  stopTimer();
  roundActive = false;
  addResult('skip');
  const answer = currentSolution ? cleanExpr(currentSolution) : '无解';
  showOverlay('⏭', '已跳过', '换个题目再战', `答案：${answer}`);
}

// ===== Event Listeners =====
document.getElementById('submitBtn').addEventListener('click', submitAnswer);
document.getElementById('exprInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});
document.getElementById('newRoundBtn').addEventListener('click', newRound);
document.getElementById('hintBtn').addEventListener('click', showHint);
document.getElementById('skipBtn').addEventListener('click', skipRound);
document.getElementById('ovNextBtn').addEventListener('click', newRound);

document.querySelectorAll('.op-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById('exprInput');
    const op = btn.dataset.op;
    if (op === 'back') {
      const pos = input.selectionStart;
      if (pos > 0) {
        input.value = input.value.slice(0, pos-1) + input.value.slice(pos);
        input.setSelectionRange(pos-1, pos-1);
      }
    } else if (op === 'clear') {
      input.value = '';
    } else {
      const pos = input.selectionStart;
      input.value = input.value.slice(0, pos) + op + input.value.slice(pos);
      input.setSelectionRange(pos + op.length, pos + op.length);
    }
    input.focus();
  });
});

// Difficulty
document.querySelectorAll('.cfg-btn[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cfg-btn[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    newRound();
  });
});

// Time limit
document.querySelectorAll('.cfg-btn[data-time]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cfg-btn[data-time]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timeLimit = parseInt(btn.dataset.time);
    if (roundActive) startTimer();
  });
});

// Reset score
document.getElementById('resetScoreBtn').addEventListener('click', () => {
  if (confirm('确定清空所有记录？')) {
    score = { wins:0, losses:0, streak:0, bestStreak:0, recent:[] };
    history = [];
    saveScore();
    renderScore();
    renderHistory();
  }
});

// Start!
newRound();
</script>
</body>
</html>
