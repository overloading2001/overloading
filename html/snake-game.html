<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 30px 20px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
            color: #fff;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88, #ffdd00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item label {
            color: #888;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 5px;
        }

        .stat-item span {
            color: #00ff88;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .game-board-wrapper {
            position: relative;
            padding: 15px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        #gameCanvas {
            display: block;
            border-radius: 10px;
            background: #0a0a1a;
            width: 600px;
            height: 600px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .difficulty-selector label {
            color: #888;
            font-size: 0.9rem;
        }

        .difficulty-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .difficulty-btn.easy { --accent: #00ff88; }
        .difficulty-btn.medium { --accent: #ffdd00; }
        .difficulty-btn.hard { --accent: #ff6b6b; }
        .difficulty-btn.extreme { --accent: #ff00ff; }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 游戏结束遮罩 */
        .game-over-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .game-over-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .game-over-overlay h2 {
            font-size: 3rem;
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .game-over-overlay .final-score {
            font-size: 1.5rem;
            color: #fff;
        }

        .game-over-overlay .final-score span {
            color: #00ff88;
            font-size: 2rem;
        }

        .instructions {
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            max-width: 400px;
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: monospace;
        }

        /* 粒子效果容器 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 217, 255, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .mobile-btn:active {
            background: rgba(0, 217, 255, 0.3);
            transform: scale(0.95);
        }

        .mobile-btn.up { grid-column: 2; grid-row: 1; }
        .mobile-btn.down { grid-column: 2; grid-row: 3; }
        .mobile-btn.left { grid-column: 1; grid-row: 2; }
        .mobile-btn.right { grid-column: 3; grid-row: 2; }

        /* 最高分 */
        .high-score {
            color: #ffdd00;
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="game-container">
        <div class="header">
            <h1>🐍 贪吃蛇</h1>
            <div class="stats">
                <div class="stat-item">
                    <label>得分</label>
                    <span id="score">0</span>
                </div>
                <div class="stat-item">
                    <label>最高分</label>
                    <span id="highScore">0</span>
                </div>
            </div>
            <div class="high-score" id="difficultyHighScore"></div>
        </div>

        <div class="game-board-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <h2>游戏结束</h2>
                <div class="final-score">
                    最终得分: <span id="finalScore">0</span>
                </div>
                <button class="btn" onclick="restartGame()">再来一局</button>
            </div>
        </div>

        <div class="controls">
            <div class="difficulty-selector">
                <label>难度:</label>
                <button class="difficulty-btn easy active" data-speed="150" onclick="setDifficulty('easy', 150)">简单</button>
                <button class="difficulty-btn medium" data-speed="100" onclick="setDifficulty('medium', 100)">中等</button>
                <button class="difficulty-btn hard" data-speed="60" onclick="setDifficulty('hard', 60)">困难</button>
                <button class="difficulty-btn extreme" data-speed="35" onclick="setDifficulty('extreme', 35)">地狱</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
            <button class="btn secondary" onclick="pauseGame()" id="pauseBtn" disabled>暂停</button>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn up" onclick="changeDirection('up')">⬆️</button>
            <button class="mobile-btn left" onclick="changeDirection('left')">⬅️</button>
            <button class="mobile-btn right" onclick="changeDirection('right')">➡️</button>
            <button class="mobile-btn down" onclick="changeDirection('down')">⬇️</button>
        </div>

        <div class="instructions">
            使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向，<kbd>空格</kbd> 暂停
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const canvasSize = 600;
        const gridSize = 20;
        const gridCount = canvasSize / gridSize;
        canvas.width = canvasSize;
        canvas.height = canvasSize;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let gameLoop = null;
        let score = 0;
        let highScores = {
            easy: 0,
            medium: 0,
            hard: 0,
            extreme: 0
        };
        let currentDifficulty = 'easy';
        let gameSpeed = 150;
        let isPlaying = false;
        let isPaused = false;

        // 加载最高分
        function loadHighScores() {
            const saved = localStorage.getItem('snakeHighScores');
            if (saved) {
                highScores = JSON.parse(saved);
            }
            updateHighScoreDisplay();
        }

        // 保存最高分
        function saveHighScores() {
            localStorage.setItem('snakeHighScores', JSON.stringify(highScores));
        }

        // 更新最高分显示
        function updateHighScoreDisplay() {
            document.getElementById('highScore').textContent = highScores[currentDifficulty];
            document.getElementById('difficultyHighScore').textContent = `当前难度最高分: ${highScores[currentDifficulty]}`;
        }

        // 设置难度
        function setDifficulty(difficulty, speed) {
            currentDifficulty = difficulty;
            gameSpeed = speed;
            
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateHighScoreDisplay();
        }

        // 初始化游戏
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            document.getElementById('score').textContent = '0';
            spawnFood();
        }

        // 生成食物
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
            food = newFood;
        }

        // 绘制圆角矩形
        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物（发光效果）
            const foodX = food.x * gridSize + gridSize / 2;
            const foodY = food.y * gridSize + gridSize / 2;
            
            // 食物光晕
            const gradient = ctx.createRadialGradient(foodX, foodY, 0, foodX, foodY, gridSize);
            gradient.addColorStop(0, 'rgba(255, 107, 107, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 107, 107, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize, 0, Math.PI * 2);
            ctx.fill();

            // 食物主体
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 食物高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(foodX - 3, foodY - 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // 绘制蛇
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                
                // 渐变色
                const hue = 150 + (index * 2) % 50;
                const saturation = 100 - (index * 0.5);
                const lightness = 50 + (index * 0.3);
                
                if (index === 0) {
                    // 蛇头
                    const headGradient = ctx.createLinearGradient(x, y, x + gridSize, y + gridSize);
                    headGradient.addColorStop(0, '#00ff88');
                    headGradient.addColorStop(1, '#00d9ff');
                    ctx.fillStyle = headGradient;
                    roundRect(x + 1, y + 1, gridSize - 2, gridSize - 2, 6);
                    
                    // 蛇眼睛
                    ctx.fillStyle = '#fff';
                    let eyeX1, eyeY1, eyeX2, eyeY2;
                    switch(direction) {
                        case 'right':
                            eyeX1 = x + gridSize - 6; eyeY1 = y + 5;
                            eyeX2 = x + gridSize - 6; eyeY2 = y + gridSize - 8;
                            break;
                        case 'left':
                            eyeX1 = x + 4; eyeY1 = y + 5;
                            eyeX2 = x + 4; eyeY2 = y + gridSize - 8;
                            break;
                        case 'up':
                            eyeX1 = x + 5; eyeY1 = y + 4;
                            eyeX2 = x + gridSize - 8; eyeY2 = y + 4;
                            break;
                        case 'down':
                            eyeX1 = x + 5; eyeY1 = y + gridSize - 6;
                            eyeX2 = x + gridSize - 8; eyeY2 = y + gridSize - 6;
                            break;
                    }
                    ctx.beginPath();
                    ctx.arc(eyeX1, eyeY1, 3, 0, Math.PI * 2);
                    ctx.arc(eyeX2, eyeY2, 3, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 瞳孔
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(eyeX1, eyeY1, 1.5, 0, Math.PI * 2);
                    ctx.arc(eyeX2, eyeY2, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 蛇身
                    const alpha = 1 - (index / snake.length) * 0.4;
                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    roundRect(x + 2, y + 2, gridSize - 4, gridSize - 4, 5);
                }
            });
        }

        // 更新游戏
        function update() {
            direction = nextDirection;
            
            // 计算新头部位置
            const head = { ...snake[0] };
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // 检查碰撞
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                gameOver();
                return;
            }
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                
                // 播放音效（可选）
                playEatSound();
            } else {
                snake.pop();
            }

            draw();
        }

        // 吃到食物的音效
        function playEatSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = 600;
            oscillator.type = 'sine';
            gainNode.gain.value = 0.1;
            
            oscillator.start();
            oscillator.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            setTimeout(() => oscillator.stop(), 100);
        }

        // 游戏结束
        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            isPlaying = false;
            
            // 更新最高分
            if (score > highScores[currentDifficulty]) {
                highScores[currentDifficulty] = score;
                saveHighScores();
                updateHighScoreDisplay();
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
        }

        // 开始游戏
        function startGame() {
            initGame();
            isPlaying = true;
            isPaused = false;
            document.getElementById('gameOverOverlay').classList.remove('show');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = '暂停';
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
            draw();
        }

        // 重新开始
        function restartGame() {
            startGame();
        }

        // 暂停游戏
        function pauseGame() {
            if (!isPlaying) return;
            
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(gameLoop);
                gameLoop = null;
                document.getElementById('pauseBtn').textContent = '继续';
                
                // 显示暂停
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
            } else {
                gameLoop = setInterval(update, gameSpeed);
                document.getElementById('pauseBtn').textContent = '暂停';
            }
        }

        // 方向改变
        function changeDirection(dir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (dir !== opposites[direction]) {
                nextDirection = dir;
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) {
                    pauseGame();
                }
                return;
            }

            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'KeyW': 'up',
                'KeyS': 'down',
                'KeyA': 'left',
                'KeyD': 'right'
            };

            if (keyMap[e.code]) {
                e.preventDefault();
                changeDirection(keyMap[e.code]);
            }
        });

        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.background = `hsla(${180 + Math.random() * 60}, 100%, 70%, ${0.3 + Math.random() * 0.4})`;
                container.appendChild(particle);
            }
        }

        // 初始化
        loadHighScores();
        createParticles();
        initGame();
        draw();
    </script>
</body>
</html>
